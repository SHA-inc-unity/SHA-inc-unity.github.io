<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to English Portfolio</title>
  <meta name="robots" content="noindex" />
  <script>
    (function() {
      var target = '/' + window.location.search + window.location.hash;
      try {
        window.localStorage.setItem('shainc-site-language', 'en');
      } catch (error) {}
      window.location.replace(target);
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 2rem;
      line-height: 1.5;
      color: #222;
    }
  </style>
</head>
<body>
  Redirecting to the English portfolio. If nothing happens, open <a href="/">the main page</a>.
</body>
</html>
